<!DOCTYPE html>
<html>
<head>
    <style>
        /*CSS styling for the calculator*/
        form {
            font-family: Arial, sans-serif;
            text-align: center;
            margin: 50px auto;
            width: 300px;
            padding: 20px;
            border: 1px solid #ccc;
            border-radius: 5px;
        }
        input[type="text"] {
            width: 100%;
            padding: 12px 20px;
            margin: 8px 0;
            box-sizing: border-box;
            border: 1px solid #ccc;
            border-radius: 4px;
        }
        input[type="button"] {
            width: 100%;
            background-color: #4CAF50;
            color: white;
            padding: 14px 20px;
            margin: 8px 0;
            border: none;
            border-radius: 4px;
            cursor: pointer;
        }
        input[type="button"]:hover {
            background-color: #45a049;
        }
        #salary {
            font-size: 20px;
            font-weight: bold;
            margin: 20px 0;
        }
    </style>
</head>
<body>
    <form>
        Hours Worked: <input type="text" id="hoursWorked"><br>
        Hourly Rate: $<input type="text" id="hourlyRate"><br>
        Tax Rate (%): <input type="text" id="taxRate"><br>
        Tax Minimum: <input type="text" id="taxRate"><br>
        <input type="button" value="Calculate Salary" onclick="calculateSalary()">
    </form>
    <br>
    <div id="salary"></div>

    <script>
        function calculateSalary() {
            var hoursWorked = document.getElementById("hoursWorked").value;
            var hourlyRate = document.getElementById("hourlyRate").value;
            var taxRate = document.getElementById("taxRate").value;
            var minitax = document.getElementById("minitax")
            var salary = hoursWorked * hourlyRate;
            var taxminimum = salary - minitax;
            var taxedSalary = salary - taxminimum - (salary * (taxRate / 100));
            document.getElementById("salary").innerHTML = "Salary: $" + taxedSalary;
        }
    </script>
</body>
</html>
